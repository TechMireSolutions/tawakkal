  /api/v1/admin/catalog/products/:
    get:
      operationId: v1_admin_catalog_products_list
      description: ViewSet for Product management in the ERP engine.
      parameters:
      - in: query
        name: brand
        schema:
          type: string
      - in: query
        name: category_id
        schema:
          type: string
          format: uuid
      - in: query
        name: is_featured
        schema:
          type: boolean
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - ACTIVE
          - ARCHIVED
          - DRAFT
          - OUT_OF_STOCK
        description: |-
          * `DRAFT` - Draft
          * `ACTIVE` - Active
          * `OUT_OF_STOCK` - Out of Stock
          * `ARCHIVED` - Archived
      tags:
      - v1
      security:
